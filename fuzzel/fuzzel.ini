[main]
include = "~/.config/fuzzel/colors-fuzzel.ini"

font = "FiraCode Nerd Font Mono:size=14"
placeholder = "Search"
prompt = " "
sort-result = true
y-margin = 25
lines = 8
width = 75
horizontal-pad = 20
vertical-pad = 15
keyboard-focus = on-demand
exit-on-keyboard-focus-loss = true

[border]
width = 1
radius = 16
selection-radius = 10
