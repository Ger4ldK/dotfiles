[mgr]
show_hidden = true
sort_by = "alphabetical"
sort_sensitive = false
show_symlink = true
sort_dir_first = true

[preview]
wrap = "yes"
image_delay = 50
image_quality = 50

[opener]
edit = [
    { run = "$EDITOR %s", block = true, for = "unix" },
]

[open]
append_rules = [
    { url = "*", use = "edit" },
]

[tasks]
image_bound      = [ 65535, 65535 ]
